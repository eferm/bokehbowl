{% extends "base.html" %}
{% block title %}Admin — bokehbowl{% endblock %}
{% block content %}
<h2>Admin sign-in</h2>
{% if error %}<p role="alert"><strong>{{ error }}</strong></p>{% endif %}
<form method="post" action="/admin/login">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <p><label>Password<br><input name="password" type="password" required autofocus></label></p>
  <p><button type="submit">Sign in</button></p>
</form>
{% endblock %}
