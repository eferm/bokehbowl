{% extends "base.html" %}
{% block body_class %}admin-login{% endblock %}
{% block title %}Admin — Bokehbowl{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Admin</h1>
  {% if error %}<p class="form-error" role="alert">{{ error }}</p>{% endif %}
  <form class="form-stack" method="post" action="/admin/login">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label class="form-label">Password <input class="form-control" name="password" type="password" required autofocus></label>
    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
