<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/site.css{% if app_commit %}?v={{ app_commit[:7] }}{% endif %}">
  <title>{% block title %}Bokehbowl: Photo Prints, Mailed Occasionally{% endblock %}</title>
  <meta name="description" content="{% block description %}Bokehbowl mails free printed photographs to people who ask for one. Leave your address and an occasional picture shows up in your mailbox.{% endblock %}">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ self.title() }}">
  <meta property="og:description" content="{{ self.description() }}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:image" content="{{ request.base_url }}static/og.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
</head>
<body class="{% block body_class %}photo-theme{% endblock %}{% if has_backdrop %} backdrop{% endif %}">
  <div class="site-shell">
  <header class="site-header">
    <a class="site-brand" href="/">bokehbowl</a>
    <nav class="site-nav">
      <a href="/account">Account</a>
      {% if request.session.get("recipient_token") %}
      <form class="header-signout" method="post" action="/logout">
        <input type="hidden" name="csrf" value="{{ csrf }}">
        <button type="submit">Sign out</button>
      </form>
      {% endif %}
    </nav>
  </header>
  <main class="site-content">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <span>© {{ current_year }} {{ operator_name }}</span>
    <span>Powered by <a href="https://github.com/eferm/bokehbowl" target="_blank" rel="noopener noreferrer">bokehbowl</a>{% if app_commit %} <code>{{ app_commit[:7] }}</code>{% endif %}</span>
    <span><a href="/privacy">Privacy</a></span>
  </footer>
  </div>
</body>
</html>
