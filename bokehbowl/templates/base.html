<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico">
  <title>{% block title %}bokehbowl{% endblock %}</title>
</head>
<body>
  <header>
    <h1><a href="/">bokehbowl</a></h1>
    <nav><a href="/account">Your account</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    <p><small>A free picture, mailed to you. Run by {{ operator_name }}.</small></p>
    <p><small><a href="/about">About</a> · <a href="/privacy">Privacy</a></small></p>
    <p><small>Powered by <a href="https://github.com/eferm/bokehbowl">bokehbowl</a>{% if app_commit %} <code>{{ app_commit[:7] }}</code>{% endif %}</small></p>
  </footer>
</body>
</html>
