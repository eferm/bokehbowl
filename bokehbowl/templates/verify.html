{% extends "base.html" %}
{% block title %}Check your email — bokehbowl{% endblock %}
{% block content %}
<h2>Check your email</h2>
<p>We sent a 6-digit code to <strong>{{ email }}</strong>. Enter it here.</p>
{% if error %}<p role="alert"><strong>{{ error }}</strong></p>{% endif %}
<form method="post" action="/verify">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <input type="hidden" name="email" value="{{ email }}">
  <p><label>Code<br><input name="code" required inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" autofocus></label></p>
  <p><button type="submit">Verify</button></p>
</form>
<form method="post" action="/login">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <input type="hidden" name="email" value="{{ email }}">
  <p><button type="submit">Resend code</button></p>
</form>
{% endblock %}
