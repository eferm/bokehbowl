{% extends "base.html" %}
{% block title %}Check your email — bokehbowl{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Check your email</h1>
  <p>We sent a 6-digit code to <strong>{{ email }}</strong>. Enter it here.</p>
  {% if error %}<p class="form-error" role="alert">{{ error }}</p>{% endif %}
  <form class="form-stack" method="post" action="/verify">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <input type="hidden" name="email" value="{{ email }}">
    <label class="form-label">Code <input class="form-control" name="code" required inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" autofocus></label>
    <button type="submit">Verify</button>
  </form>
  <form class="form-stack" method="post" action="/login">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <input type="hidden" name="email" value="{{ email }}">
    <button type="submit">Resend code</button>
  </form>
</div>
{% endblock %}
