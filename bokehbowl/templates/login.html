{% extends "base.html" %}
{% block title %}Sign in — bokehbowl{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Account</h1>
  <p>Enter your email and we'll send you a sign-in code.</p>
  {% if error %}<p class="form-error" role="alert">{{ error }}</p>{% endif %}
  <form class="form-stack" method="post" action="/login">
    <input type="hidden" name="csrf" value="{{ csrf }}">
    <label class="form-label">Email <input class="form-control" name="email" type="email" required autocomplete="email" autofocus></label>
    <button type="submit">Email me a code</button>
  </form>
</div>
{% endblock %}
