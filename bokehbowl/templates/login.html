{% extends "base.html" %}
{% block title %}Sign in — bokehbowl{% endblock %}
{% block content %}
<h2>Sign in</h2>
<p>Enter your email and we'll send you a sign-in code.</p>
<form method="post" action="/login">
  <input type="hidden" name="csrf" value="{{ csrf }}">
  <p><label>Email<br><input name="email" type="email" required autocomplete="email" autofocus></label></p>
  <p><button type="submit">Email me a code</button></p>
</form>
{% endblock %}
